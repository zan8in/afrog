id: druid-panel

info:
  name: Druid Panel
  author: zan8in
  severity: info
  verified: true
  tags: druid,panel
  created: 2023/12/22

rules:
  r0:
    brute:
      mode: clusterbomb
      commit: winner
      continue: false
      p:
        - /druid/login.html
        - /prod-api/druid/login.html
        - /dev-api/druid/login.html
        - /api/druid/login.html
        - /admin/druid/login.html
        - /admin-api/druid/login.html
    request:
      method: GET
      path: "{{p}}"
    expression: response.status == 200 && response.body.ibcontains(b'<title>druid monitor</title>')
expression: r0()
