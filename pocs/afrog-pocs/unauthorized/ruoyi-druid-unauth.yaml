id: ruoyi-druid-unauth

info:
  name: 若依管理系统 druid 未授权访问
  author: zan9in
  severity: high
  verified: true
  description: |-
    若依管理系统未授权访问
  tags: ruoyi,druid,unauth
  created: 2023/07/07

rules:
  r0:
    brute:
      mode: clusterbomb
      commit: winner
      continue: false
      p:
        - /druid/index.html
        - /prod-api/druid/index.html
        - /dev-api/druid/index.html
        - /api/druid/index.html
        - /admin/druid/index.html
        - /admin-api/druid/index.html
    request:
      method: GET
      path: "{{p}}"
    expression: response.status == 200 && response.body.bcontains(b"Druid Stat Index") && response.body.bcontains(b"DruidVersion") && response.body.bcontains(b"DruidDrivers")
expression: r0()
